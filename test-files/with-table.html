<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>包含表格测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        h1 {
            color: #4a6fa5;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .table-container {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>包含表格的 HTML 测试</h1>
    <p>这个 HTML 文件包含了表格，用于测试 HTML 转图片功能对表格的支持。</p>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>名称</th>
                    <th>类型</th>
                    <th>状态</th>
                    <th>描述</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>项目 A</td>
                    <td>开发</td>
                    <td>进行中</td>
                    <td>Web 应用开发</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>项目 B</td>
                    <td>设计</td>
                    <td>已完成</td>
                    <td>UI/UX 设计</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>项目 C</td>
                    <td>测试</td>
                    <td>计划中</td>
                    <td>功能测试</td>
                </tr>
                <tr>
                    <td>4</td>
                    <td>项目 D</td>
                    <td>部署</td>
                    <td>进行中</td>
                    <td>服务器部署</td>
                </tr>
                <tr>
                    <td>5</td>
                    <td>项目 E</td>
                    <td>维护</td>
                    <td>已完成</td>
                    <td>系统维护</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <p>这个文件测试了：</p>
    <ul>
        <li>表格的渲染</li>
        <li>表格样式（边框、背景色）</li>
        <li>表格悬停效果</li>
        <li>响应式表格容器</li>
    </ul>
</body>
</html>
